<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g filter="shadow">
    <rect x="120" y="100" width="272" height="200" rx="16" fill="#1e293b" stroke="#334155" stroke-width="3"/>
    <rect x="135" y="115" width="242" height="165" rx="8" fill="#0f172a"/>
    <rect x="220" y="300" width="72" height="20" rx="4" fill="#334155"/>
    <rect x="190" y="315" width="132" height="10" rx="5" fill="#334155"/>
  </g>
  <g filter="glow">
    <text x="160" y="195" font-family="monospace" font-size="38" fill="url(#screen)" opacity="0.9">&gt;_ IT</text>
    <line x1="160" y1="220" x2="300" y2="220" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>
    <text x="160" y="255" font-family="monospace" font-size="20" fill="#94a3b8" opacity="0.6">history</text>
  </g>
  <g fill="#22d3ee" opacity="0.3">
    <circle cx="160" cy="370" r="4"/><circle cx="180" cy="385" r="3"/><circle cx="200" cy="395" r="2.5"/>
    <circle cx="310" cy="370" r="3"/><circle cx="340" cy="385" r="4"/><circle cx="360" cy="395" r="2"/>
  </g>
</svg>
